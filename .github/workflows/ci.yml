name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  YARN_ENABLE_GLOBAL_CACHE: false

jobs:
  chore:
    name: "Testing chores"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          # check-latest: true
        env:
          SKIP_YARN_COREPACK_CHECK: 1

      - name: Get the Yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(corepack yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{steps.yarn-cache-dir-path.outputs.dir}}
          key: ${{runner.os}}-yarn-${{hashFiles('**/yarn.lock')}}
          restore-keys: |
            ${{runner.os}}-yarn-

      - run: corepack yarn install --immutable

      - name: "Check for type errors"
        run: corepack yarn typecheck

      - name: "Check for linting errors"
        run: corepack yarn lint --max-warnings=0

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        node:
          # - 20
          - 22
          - 24
          - 25
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest

      # Temporarily skipping Node.js 24 under Windows due to issue
      # https://github.com/nodejs/corepack/issues/715
      # vitest fails "handle integrity checks" on Windows with Node.js 24.x
        exclude:
          - node: 24
            platform: windows-latest

    name: "${{matrix.platform}} w/ Node.js ${{matrix.node}}.x"
    runs-on: ${{matrix.platform}}

    steps:
      - uses: actions/checkout@v6

      - name: "Use Node.js ${{matrix.node}}.x"
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node}}.x
          # check-latest: true

        env:
          SKIP_YARN_COREPACK_CHECK: 1

      - name: Get the Yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(corepack yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
        shell: bash # Needs explicit bash for Windows-support

      - uses: actions/cache@v5
        with:
          path: ${{steps.yarn-cache-dir-path.outputs.dir}}
          key: ${{runner.os}}-yarn-${{hashFiles('**/yarn.lock')}}
          restore-keys: |
            ${{runner.os}}-yarn-

      - run: npm install -g corepack # for Node.js 25
      - run: corepack yarn install --immutable
      - run: corepack yarn build # We need the stubs to run the tests

      - run: corepack yarn test
        env:
          NOCK_ENV: replay
